# Example GitHub Actions workflow — copy to .github/workflows/agent-inspect-artifact.yml
# AgentInspect does NOT upload anything; upload-artifact is user-controlled CI config.

name: AgentInspect trace artifact

on:
  workflow_dispatch:

jobs:
  traced-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        run: npm install agent-inspect

      - name: Run traced fixture job
        env:
          AGENT_INSPECT: "1"
          AGENT_INSPECT_TRACE_DIR: "./.agent-inspect"
        run: npx tsx examples/recipes/github-actions-artifact/src/index.ts

      - name: Export share-safe markdown artifact
        run: |
          mkdir -p ./artifacts
          npx agent-inspect list --dir ./.agent-inspect
          npx agent-inspect what ci-fixture-agent --dir ./.agent-inspect
          npx agent-inspect export ci-fixture-agent \
            --dir ./.agent-inspect \
            --format markdown \
            --redaction-profile share \
            -o ./artifacts/trace.md
          npx agent-inspect report ci-fixture-agent \
            --dir ./.agent-inspect \
            --format html \
            --redaction-profile share \
            -o ./artifacts/report.html

      - name: Summarize reporter artifacts
        if: always()
        run: |
          manifests="$(find ./.agent-inspect -path '*/tests/*/*/report.json' -print | sort)"
          if [ -n "$manifests" ]; then
            npx agent-inspect ci-summary $manifests \
              --output ./artifacts/reporter-summary.md \
              --github-summary "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload trace artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-inspect-traces
          path: |
            ./.agent-inspect
            ./artifacts
          if-no-files-found: error
