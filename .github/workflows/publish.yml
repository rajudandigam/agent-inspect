name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Verify (release-train gates)
        run: |
          pnpm run test:all
          pnpm run fixtures:check
          pnpm run recipes:check
          pnpm run pack:smoke
          pnpm run compat:smoke

      # npm Trusted Publishing (OIDC): configure on npmjs.com for EACH published package:
      #   agent-inspect, @agent-inspect/ai-sdk, @agent-inspect/langchain,
      #   @agent-inspect/tui, @agent-inspect/openai-agents
      # Package → Settings → Trusted Publisher → GitHub Actions:
      #   owner: rajudandigam, repo: agent-inspect, workflow: publish.yml
      # E404 on scoped packages usually means Trusted Publisher is missing on that package.
      # See docs/community/MAINTAINER-GUIDE.md#npm-trusted-publishing
      #
      # Optional recovery: set NPM_TOKEN with publish access on every published package.
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
