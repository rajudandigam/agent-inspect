name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Verify (typecheck, tests, build, size)
        run: pnpm run test:all

      # Trusted Publishing (OIDC): on npmjs.com, set the GitHub trusted publisher workflow name to **publish.yml**
      # (this file), matching the repo path `.github/workflows/publish.yml`. No NPM_TOKEN secret.
      #
      # Configure on npmjs.com (after the package exists):
      # - GitHub owner: rajudandigam
      # - Repository: agent-inspect
      # - Workflow filename: publish.yml
      - name: Create Release PR
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
